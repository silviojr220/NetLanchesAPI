<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --amarelo: #FFC107;
            --amarelo-dark: #ffb300;
        }

        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }

        /* NAVBAR */
        .navbar {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://images.unsplash.com/photo-1550547660-d9450f859349');
            background-size: cover;
            background-position: center;
            height: 220px;
            border-radius: 22px;
            display: flex;
            align-items: center;
            padding: 40px;
            color: white;
            margin-bottom: 30px;
        }

            .hero h1 {
                font-size: 2.5rem;
                font-weight: bold;
            }

        /* CARD PEDIDO */
        .pedido-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.06);
            transition: .25s;
        }

            .pedido-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            }

        /* HEADER */
        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* BADGE */
        .badge-status {
            background: var(--amarelo);
            color: #333;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: .8rem;
            font-weight: bold;
        }

        /* ITENS */
        .item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        /* TOTAL */
        .total {
            font-size: 1.2rem;
            font-weight: bold;
            color: #198754;
        }

        /* BOTÃO */
        .btn-voltar {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar px-4 py-3 mb-4">

        <div class="container-fluid">

            <span class="logo">
                Pedidos
            </span>

            <div class="d-flex gap-2">

                <a href="#" onclick="voltar()" class="btn btn-outline-dark btn-voltar">
                    ← Voltar
                </a>

                <button class="btn btn-danger"
                        onclick="logout()">

                    Sair
                </button>

            </div>

        </div>

    </nav>

    <div class="container">

        <!-- HERO -->
        <div class="hero">

            <div>
                <h1>Histórico de Pedidos</h1>

                <p>
                    Acompanhe todos os pedidos realizados.
                </p>
            </div>

        </div>

        <!-- PEDIDOS -->
        <div id="pedidos"
             class="row g-4">

        </div>

    </div>

    <script src="js/pedidos.js"></script>

</body>
</html>
