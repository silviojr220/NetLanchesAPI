<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        :root {
            --amarelo: #FFC107;
            --amarelo-dark: #ffb300;
            --bg: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #1f1f1f;
            color: white;
            padding: 30px 20px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item {
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            transition: .2s;
        }

            .menu-item:hover {
                background: rgba(255,255,255,.08);
            }

        .main {
            flex: 1;
            padding: 35px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .user-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--amarelo);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)), url('https://images.unsplash.com/photo-1561758033-d89a9ad46330');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            padding: 45px;
            color: white;
            margin-bottom: 35px;
        }

            .hero h1 {
                font-size: 2.8rem;
                font-weight: bold;
            }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .card-custom {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 5px 25px rgba(0,0,0,.06);
        }

        .form-control {
            border-radius: 12px;
            padding: 14px;
        }

        .btn-main {
            background: var(--amarelo);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: bold;
            transition: .2s;
        }

            .btn-main:hover {
                background: var(--amarelo-dark);
                transform: translateY(-2px);
            }

        .admin-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .status {
            background: #198754;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: .8rem;
        }

        @media(max-width:992px) {

            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="layout">

        <aside class="sidebar">

            <div class="logo">
                👑 Super Admin
            </div>

            <div class="menu">

                <div class="menu-item">
                    👥 Administradores
                </div>

                <div class="menu-item"
                     onclick="window.location.href='pedidos.html'">

                    📦 Pedidos
                </div>

            </div>

        </aside>

        <main class="main">

            <div class="topbar">

                <div class="user-box">

                    <div class="avatar">
                        👑
                    </div>

                    <div>
                        <small>Logado como</small>
                        <h5 class="mb-0">SUPER ADMIN</h5>
                    </div>

                </div>

                <button class="btn btn-danger" onclick="logout()">
                    Sair
                </button>

            </div>

            <div class="hero">

                <h1>Painel Master</h1>

                <p>
                    Gerencie administradores e funcionários.
                </p>

            </div>

            <div class="grid">

                <!-- ADM -->
                <div class="card-custom">

                    <h3 class="mb-4">
                        Criar Administrador
                    </h3>

                    <input type="email"
                           id="email"
                           class="form-control mb-3"
                           placeholder="Email">

                    <input type="password"
                           id="senha"
                           class="form-control mb-3"
                           placeholder="Senha">

                    <!-- CORRIGIDO -->
                    <input type="tel"
                           id="telefone"
                           class="form-control mb-4"
                           placeholder="Telefone"
                           maxlength="15">

                    <button class="btn btn-main w-100"
                            onclick="criarAdm()">

                        Criar ADM

                    </button>

                </div>

                <!-- FUNCIONÁRIO -->
                <div class="card-custom">

                    <h3 class="mb-4">
                        Criar Funcionário
                    </h3>

                    <input type="email"
                           id="func-email"
                           class="form-control mb-3"
                           placeholder="Email">

                    <input type="password"
                           id="func-senha"
                           class="form-control mb-3"
                           placeholder="Senha">

                    <!-- CORRIGIDO -->
                    <input type="tel"
                           id="func-telefone"
                           class="form-control mb-3"
                           placeholder="Telefone"
                           maxlength="15">

                    <button class="btn btn-main w-100"
                            onclick="criarFuncionario()">

                        Criar Funcionário

                    </button>

                </div>

                <div class="card-custom">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <h3>Administradores</h3>

                        <span class="status">
                            Online
                        </span>

                    </div>

                    <div id="listaAdms"></div>

                </div>

                <div class="card-custom" style="grid-column: 1 / -1;">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <h3>Clientes</h3>

                        <span class="status">
                            Cadastrados
                        </span>

                    </div>

                    <div id="listaClientes"></div>

                </div>

                <div class="card-custom" style="grid-column: 1 / -1;">

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <h3>Funcionários</h3>

                        <span class="status">
                            Ativos
                        </span>

                    </div>

                    <div id="listaFuncionarios"></div>

                </div>

            </div>

        </main>

    </div>

    <script src="/js/superadmin.js"></script>

</body>
</html>
