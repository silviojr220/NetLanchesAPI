<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        :root {
            --amarelo: #FFC107;
            --amarelo-dark: #ffb300;
            --bg: #f4f6f9;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
        }

        /* NAVBAR */

        .navbar {
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.06);
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
            color: #212529;
        }

        /* CARDS */

        .card-custom {
            border: none;
            border-radius: 22px;
            background: white;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* TITULOS */

        .section-title {
            font-weight: 700;
            color: #212529;
        }

        /* INPUTS */

        .form-control,
        .form-select {
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #dee2e6;
        }

            .form-control:focus,
            .form-select:focus {
                border-color: var(--amarelo);
                box-shadow: 0 0 0 4px rgba(255,193,7,0.18);
            }

        textarea.form-control {
            resize: none;
        }

        .input-group-text {
            border-radius: 12px 0 0 12px;
        }

        /* BOTÕES */

        .btn-warning {
            background: var(--amarelo);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            padding: 12px;
        }

            .btn-warning:hover {
                background: var(--amarelo-dark);
            }

        .btn-sm {
            width: 38px;
            height: 38px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            padding: 0;
        }

        /* INFO BOX */

        .info-box {
            background: linear-gradient(135deg, #ffc107, #ffcf40);
            border-radius: 20px;
            padding: 22px;
            color: #212529;
            min-height: 120px;
        }

            .info-box i {
                font-size: 2rem;
            }

        .info-title {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        .info-value {
            font-size: 1.8rem;
            font-weight: bold;
        }

        /* TABELA */

        .table-responsive {
            border-radius: 18px;
        }

        .table {
            margin-bottom: 0;
        }

            .table thead {
                background: #212529;
                color: white;
            }

                .table thead th {
                    border: none;
                    padding: 16px;
                    font-size: 0.95rem;
                    white-space: nowrap;
                }

            .table tbody td {
                padding: 16px;
                vertical-align: middle;
                font-size: 0.95rem;
            }

            .table tbody tr {
                transition: 0.2s;
            }

                .table tbody tr:hover {
                    background: rgba(255,193,7,0.08);
                }

        /* TOAST */

        .toast {
            border-radius: 14px;
        }

        /* RESPONSIVO */

        @media (max-width: 992px) {

            .table {
                min-width: 850px;
            }

            .card-custom {
                border-radius: 18px;
            }

            .row.g-4 {
                gap: 10px 0;
            }
        }

        @media (max-width: 768px) {

            body {
                padding-bottom: 30px;
            }

            .navbar {
                padding: 15px !important;
            }

                .navbar .container-fluid {
                    flex-direction: column;
                    align-items: stretch !important;
                    gap: 15px;
                }

                .navbar .d-flex.gap-2 {
                    width: 100%;
                    flex-direction: column;
                }

                .navbar .btn {
                    width: 100%;
                }

            .logo {
                text-align: center;
                font-size: 1.2rem;
            }

            .card-custom {
                padding: 20px !important;
            }

            .section-title {
                font-size: 1.2rem;
            }

            .table {
                min-width: 750px;
            }

                .table thead th,
                .table tbody td {
                    font-size: 0.85rem;
                    white-space: nowrap;
                }

            textarea.form-control {
                min-height: 120px;
            }
        }

        @media (max-width: 480px) {

            .container {
                padding-left: 12px;
                padding-right: 12px;
            }

            .card-custom {
                padding: 16px !important;
                border-radius: 16px;
            }

            .logo {
                font-size: 1rem;
            }

            .section-title {
                font-size: 1rem;
            }

            .info-title {
                font-size: 0.8rem;
            }

            .info-value {
                font-size: 1.3rem;
            }

            .table {
                min-width: 680px;
            }

                .table thead th,
                .table tbody td {
                    padding: 12px;
                }

            .btn-sm {
                width: 34px;
                height: 34px;
                font-size: 0.8rem;
            }

            .toast {
                width: 95vw;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar navbar-expand-lg px-4 py-3 mb-4">

        <div class="container-fluid">

            <div class="d-flex align-items-center gap-2">

                <i class="bi bi-speedometer2 fs-3 text-warning"></i>

                <span class="logo">
                    Painel Administrativo
                </span>

            </div>

            <div class="d-flex gap-2">

                <a href="pedidos.html"
                   class="btn btn-outline-dark rounded-pill px-4">

                    <i class="bi bi-receipt-cutoff me-2"></i>
                    Pedidos
                </a>

                <button class="btn btn-danger rounded-pill px-4"
                        onclick="logout()">

                    <i class="bi bi-box-arrow-right me-2"></i>
                    Sair
                </button>

            </div>

        </div>

    </nav>

    <div class="container">

        <!-- INFO -->

        <div class="row mb-4">

            <div class="col-12 col-md-4">

                <div class="info-box d-flex justify-content-between align-items-center">

                    <div>

                        <div class="info-title">
                            Produtos Cadastrados
                        </div>

                        <div class="info-value" id="totalProdutos">
                            0
                        </div>

                    </div>

                    <i class="bi bi-box-seam"></i>

                </div>

            </div>

        </div>

        <div class="row g-4">

            <!-- FORM -->

            <div class="col-12 col-xl-4">

                <div class="card-custom p-4 h-100">

                    <div class="d-flex align-items-center gap-2 mb-4">

                        <i class="bi bi-plus-circle-fill text-warning fs-4"></i>

                        <h4 class="section-title mb-0">
                            Cadastrar Produto
                        </h4>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Nome do Produto
                        </label>

                        <input type="text"
                               id="nome"
                               class="form-control"
                               placeholder="Ex: X-Bacon">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Tipo
                        </label>

                        <select id="tipo" class="form-select">

                            <option value="">Selecione</option>
                            <option value="LANCHE">Lanche</option>
                            <option value="BEBIDA">Bebida</option>
                            <option value="SOBREMESA">Sobremesa</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">
                            Preço
                        </label>

                        <div class="input-group">

                            <span class="input-group-text">
                                R$
                            </span>

                            <input type="number"
                                   id="preco"
                                   class="form-control"
                                   placeholder="0.00"
                                   step="0.01">

                        </div>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            Descrição
                        </label>

                        <textarea id="descricao"
                                  rows="4"
                                  class="form-control"
                                  placeholder="Descreva o produto"></textarea>

                    </div>

                    <div class="mb-4">

                        <label class="form-label fw-semibold">
                            URL da Imagem
                        </label>
                        <input type="file"
                               id="imagem"
                               class="form-control"
                               accept="image/*">

                    </div>

                    <button class="btn btn-warning w-100"
                            id="btnProduto"
                            onclick="criarProduto()">

                        <i class="bi bi-check-circle me-2"></i>
                        Cadastrar Produto

                    </button>

                </div>

            </div>

            <!-- LISTA -->

            <div class="col-12 col-xl-8">

                <div class="card-custom p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">

                        <div class="d-flex align-items-center gap-2">

                            <i class="bi bi-bag-fill text-warning fs-4"></i>

                            <h4 class="section-title mb-0">
                                Produtos
                            </h4>

                        </div>

                        <span class="badge bg-dark px-3 py-2 rounded-pill">
                            Lista Atualizada
                        </span>

                    </div>

                    <div class="table-responsive rounded-4">

                        <table class="table align-middle">

                            <thead>

                                <tr>

                                    <th>
                                        <i class="bi bi-box me-1"></i>
                                        Nome
                                    </th>

                                    <th>
                                        <i class="bi bi-tags me-1"></i>
                                        Tipo
                                    </th>

                                    <th>
                                        <i class="bi bi-currency-dollar me-1"></i>
                                        Preço
                                    </th>

                                    <th>
                                        <i class="bi bi-file-text-fill me-1"></i>
                                        Descrição
                                    </th>

                                    <th class="text-center">
                                        <i class="bi bi-gear me-1"></i>
                                        Ações
                                    </th>

                                </tr>

                            </thead>

                            <tbody id="listaProdutos"></tbody>

                        </table>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <!-- TOAST -->

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">

        <div id="toast"
             class="toast align-items-center text-bg-dark border-0 shadow-lg"
             role="alert">

            <div class="d-flex">

                <div class="toast-body fw-semibold"></div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast"></button>

            </div>

        </div>

    </div>

    <!-- JS -->
    <script src="js/admin.js"></script>

    <!-- CONTADOR -->
    <script>

        const observer = new MutationObserver(() => {

            document.getElementById("totalProdutos").innerText =
                document.querySelectorAll("#listaProdutos tr").length;

        });

        observer.observe(document.getElementById("listaProdutos"), {
            childList: true
        });

    </script>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
