<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f5f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: #1f1f1f;
            color: white;
            padding: 30px 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-item {
            padding: 15px;
            border-radius: 14px;
            cursor: pointer;
            transition: .2s;
            text-decoration: none;
            color: white;
        }

            .menu-item:hover {
                background: rgba(255,255,255,.08);
                color: white;
            }

            .menu-item.active {
                background: #e83e8c;
                color: white;
            }

        .main {
            flex: 1;
            padding: 35px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .hero {
            background: linear-gradient(rgba(0,0,0,.5), rgba(0,0,0,.5)), url('https://images.unsplash.com/photo-1561758033-d89a9ad46330');
            background-size: cover;
            background-position: center;
            border-radius: 22px;
            padding: 45px;
            color: white;
            margin-bottom: 35px;
        }

            .hero h1 {
                font-size: 2.5rem;
                font-weight: bold;
            }

        .produto-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,.07);
            transition: .25s;
        }

            .produto-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 15px 30px rgba(0,0,0,.12);
            }

        .produto-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .produto-body {
            padding: 20px;
        }

        .produto-nome {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 6px;
        }

        .produto-desc {
            color: #888;
            font-size: .9rem;
            margin-bottom: 12px;
            min-height: 38px;
        }

        .produto-preco {
            font-size: 1.2rem;
            font-weight: bold;
            color: #198754;
        }

        .badge-disponivel {
            background: #d1e7dd;
            color: #0f5132;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: bold;
        }

        .badge-indisponivel {
            background: #f8d7da;
            color: #842029;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: bold;
        }

        @media(max-width: 992px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="layout">

        <aside class="sidebar">
            <div class="logo">🧑‍💼 Funcionário</div>
            <div class="menu">
                <a class="menu-item" href="funcionario.html">🏠 Início</a>
                <a class="menu-item active" href="cardapio-func.html">🍽️ Cardápio</a>
                <a class="menu-item" href="preparo.html">🔥 Preparo</a>
                <a class="menu-item" href="pedidos-funcionario.html">📦 Pedidos</a>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <h4 class="mb-0">🍽️ Cardápio</h4>
                <button class="btn btn-danger" onclick="logout()">Sair</button>
            </div>

            <div class="hero">
                <h1>Cardápio</h1>
                <p>Consulte os produtos disponíveis.</p>
            </div>

            <!-- Busca -->
            <div class="mb-4">
                <input type="text"
                       id="busca"
                       class="form-control"
                       placeholder="🔍 Buscar produto..."
                       oninput="buscar(this.value)"
                       style="border-radius: 14px; padding: 14px;">
            </div>

            <div id="produtos" class="row g-4">
                <div class="col-12 text-center py-5 text-muted">Carregando cardápio...</div>
            </div>
        </main>

    </div>
    <script src="cardapio-func.js"></script>
</body>
</html>
