<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <!-- FAVICON -->

    <link rel="icon"
          type="image/png"
          href="img/logo.png">

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- BOOTSTRAP ICONS -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        :root {
            --amarelo: #FFC107;
            --amarelo-escuro: #ffb300;
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient( rgba(255,193,7,0.35), rgba(255,255,255,0.25) ), url('https://images.unsplash.com/photo-1550547660-d9450f859349');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 380px;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.6);
            color: #333;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: fade .35s ease;
        }

        @keyframes fade {

            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .input-group-text {
            background: rgba(255,255,255,.7);
            border: 1px solid #ddd;
            border-radius: 12px 0 0 12px;
        }

        .form-control {
            background: rgba(255,255,255,.75);
            border: 1px solid #ddd;
            border-radius: 0 12px 12px 0;
            height: 52px;
        }

            .form-control:focus {
                border-color: var(--amarelo);
                box-shadow: 0 0 0 3px rgba(255,193,7,.25);
            }

        .password-box {
            position: relative;
            display: flex;
            align-items: center;
        }

            .password-box .form-control {
                padding-left: 55px;
                padding-right: 55px;
                border-radius: 14px;
            }

        .input-icon {
            position: absolute;
            left: 18px;
            z-index: 5;
            color: #555;
            display: flex;
            align-items: center;
        }

        .show-pass {
            position: absolute;
            right: 18px;
            z-index: 5;
            cursor: pointer;
            color: #555;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            .show-pass i,
            .input-icon i {
                font-size: 1.1rem;
            }

        .btn-login {
            background: var(--amarelo);
            border: none;
            border-radius: 30px;
            font-weight: bold;
            height: 52px;
            transition: .25s;
        }

            .btn-login:hover {
                background: var(--amarelo-escuro);
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(255,193,7,.35);
            }

        .links {
            text-align: center;
            margin-top: 18px;
        }

            .links a {
                color: #555;
                text-decoration: none;
                font-weight: 600;
            }

        .bi {
            vertical-align: middle;
        }

        h2 i,
        .btn-login i {
            margin-right: 8px;
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h2>

            <i class="bi bi-person-fill"></i>

            Login

        </h2>

        <!-- EMAIL -->

        <div class="input-group mb-3">

            <span class="input-group-text">

                <i class="bi bi-envelope-fill"></i>

            </span>

            <input type="text"
                   id="email"
                   class="form-control"
                   placeholder="Email">

        </div>

        <!-- SENHA -->

        <div class="password-box mb-3">

            <span class="input-icon">

                <i class="bi bi-lock-fill"></i>

            </span>

            <input type="password"
                   id="senha"
                   class="form-control"
                   placeholder="Senha">

            <span class="show-pass"
                  onclick="toggleSenha()">

                <i class="bi bi-eye-fill"></i>

            </span>

        </div>

        <!-- BOTÃO -->

        <button class="btn btn-login w-100"
                onclick="login()">

            <i class="bi bi-box-arrow-in-right"></i>

            Entrar

        </button>

        <!-- LINKS -->

        <div class="links">

            Não tem conta?

            <a href="cadastro.html">
                Criar conta
            </a>

        </div>

    </div>

    <!-- TOAST -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="toast"
             class="toast border-0 text-white">

            <div class="d-flex">

                <div class="toast-body"
                     id="toastBody">
                </div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <!-- BOOTSTRAP JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- LOGIN JS -->

    <script src="js/login.js"></script>

</body>

</html>
