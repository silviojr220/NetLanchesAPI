<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Cadastro • NetLanches</title>

    <!-- BOOTSTRAP -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- ICONS -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        :root {
            --amarelo: #FFC107;
            --amarelo-dark: #ffb300;
            --dark: #1f1f1f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient( rgba(0,0,0,.55), rgba(0,0,0,.55) ), url('https://images.unsplash.com/photo-1550547660-d9450f859349');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* CARD */

        .box {
            width: 100%;
            max-width: 430px;
            padding: 42px;
            border-radius: 28px;
            background: rgba(255,255,255,.88);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,.25);
            animation: fade .35s ease;
        }

        @keyframes fade {

            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* HEADER */

        .logo {
            width: 75px;
            height: 75px;
            margin: 0 auto 20px;
            border-radius: 50%;
            background: linear-gradient( 135deg, var(--amarelo), var(--amarelo-dark) );
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-size: 2rem;
            box-shadow: 0 10px 25px rgba(255,193,7,.35);
        }

        h2 {
            text-align: center;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: .95rem;
        }

        /* INPUTS */

        .form-group {
            margin-bottom: 18px;
        }

        .label {
            font-size: .9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #444;
        }

        .input-wrapper {
            position: relative;
        }

            .input-wrapper i {
                position: absolute;
                left: 18px;
                top: 50%;
                transform: translateY(-50%);
                color: #777;
                z-index: 5;
            }

        .form-control {
            height: 56px;
            border-radius: 16px;
            border: 1px solid #ddd;
            padding-left: 50px;
            background: rgba(255,255,255,.9);
            transition: .2s;
        }

            .form-control:focus {
                border-color: var(--amarelo);
                box-shadow: 0 0 0 4px rgba(255,193,7,.2);
            }

        /* SENHA */

        .toggle-pass {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #777;
        }

        /* BOTÃO */

        .btn-main {
            height: 56px;
            border: none;
            border-radius: 18px;
            background: linear-gradient( 135deg, var(--amarelo), var(--amarelo-dark) );
            color: #222;
            font-weight: 800;
            font-size: 1rem;
            transition: .25s;
        }

            .btn-main:hover {
                transform: translateY(-2px);
                box-shadow: 0 12px 24px rgba(255,193,7,.35);
            }

        /* LINKS */

        .links {
            text-align: center;
            margin-top: 22px;
            color: #666;
        }

            .links a {
                color: #222;
                font-weight: 700;
                text-decoration: none;
            }

                .links a:hover {
                    text-decoration: underline;
                }

        /* TOAST */

        .toast {
            border-radius: 16px;
        }

        /* MOBILE */

        @media (max-width: 500px) {

            .box {
                padding: 28px;
            }
        }
    </style>

</head>

<body>

    <div class="box">

        <!-- LOGO -->

        <div class="logo">

            <i class="bi bi-bag-plus-fill"></i>

        </div>

        <h2>

            Criar Conta

        </h2>

        <div class="subtitle">

            Faça seu cadastro para começar seus pedidos 🍔

        </div>

        <!-- EMAIL -->

        <div class="form-group">

            <div class="label">

                Email

            </div>

            <div class="input-wrapper">

                <i class="bi bi-envelope-fill"></i>

                <input type="email"
                       id="email"
                       class="form-control"
                       placeholder="Digite seu email">

            </div>

        </div>

        <!-- TELEFONE -->

        <div class="form-group">

            <div class="label">

                Telefone

            </div>

            <div class="input-wrapper">

                <i class="bi bi-telephone-fill"></i>

                <input type="tel"
                       id="telefone"
                       class="form-control"
                       placeholder="(00) 00000-0000"
                       maxlength="15"
                       oninput="formatarTelefone(this)">

            </div>

        </div>

        <!-- SENHA -->

        <div class="form-group">

            <div class="label">

                Senha

            </div>

            <div class="input-wrapper">

                <i class="bi bi-lock-fill"></i>

                <input type="password"
                       id="senha"
                       class="form-control"
                       placeholder="Digite sua senha">

                <span class="toggle-pass"
                      onclick="toggleSenha()">

                    <i class="bi bi-eye-fill"></i>

                </span>

            </div>

        </div>

        <!-- BOTÃO -->

        <button class="btn btn-main w-100"
                onclick="cadastrar()">

            <i class="bi bi-check-circle-fill me-2"></i>

            Criar Conta

        </button>

        <!-- LINKS -->

        <div class="links">

            Já possui conta?

            <a href="login.html">

                Fazer login

            </a>

        </div>

    </div>

    <!-- TOAST -->

    <div class="toast-container position-fixed bottom-0 end-0 p-3">

        <div id="toast"
             class="toast border-0 text-white">

            <div class="d-flex">

                <div class="toast-body"></div>

                <button type="button"
                        class="btn-close btn-close-white me-2 m-auto"
                        data-bs-dismiss="toast">
                </button>

            </div>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

        function toast(msg, tipo = "warning") {

            const t = document.getElementById("toast");

            const body =
                t.querySelector(".toast-body");

            t.className =
                "toast border-0 text-white";

            if (tipo === "success") {

                t.classList.add("bg-success");

            } else if (tipo === "error") {

                t.classList.add("bg-danger");

            } else {

                t.classList.add("bg-warning");
                t.classList.remove("text-white");
                t.classList.add("text-dark");
            }

            body.innerHTML = msg;

            new bootstrap.Toast(t).show();
        }

        function toggleSenha() {

            const input =
                document.getElementById("senha");

            const icon =
                document.querySelector(".toggle-pass i");

            if (input.type === "password") {

                input.type = "text";

                icon.className =
                    "bi bi-eye-slash-fill";

            } else {

                input.type = "password";

                icon.className =
                    "bi bi-eye-fill";
            }
        }

        function formatarTelefone(input) {

            let valor =
                input.value.replace(/\D/g, "");

            valor =
                valor.substring(0, 11);

            if (valor.length > 10) {

                valor = valor.replace(
                    /^(\d{2})(\d{5})(\d{4}).*/,
                    "($1) $2-$3"
                );

            } else if (valor.length > 6) {

                valor = valor.replace(
                    /^(\d{2})(\d{4})(\d{0,4}).*/,
                    "($1) $2-$3"
                );

            } else if (valor.length > 2) {

                valor = valor.replace(
                    /^(\d{2})(\d{0,5})/,
                    "($1) $2"
                );

            } else {

                valor = valor.replace(
                    /^(\d*)/,
                    "($1"
                );
            }

            input.value = valor;
        }

        async function cadastrar() {

            const email =
                document.getElementById("email")
                    .value
                    .trim();

            const senha =
                document.getElementById("senha")
                    .value;

            const telefone =
                document.getElementById("telefone")
                    .value
                    .replace(/\D/g, "");

            if (!email ||
                !senha ||
                !telefone) {

                toast(
                    '<i class="bi bi-exclamation-triangle-fill"></i> Preencha todos os campos',
                    'warning'
                );

                return;
            }

            if (
                telefone.length < 10 ||
                telefone.length > 11
            ) {

                toast(
                    '<i class="bi bi-telephone-x-fill"></i> Telefone inválido',
                    'warning'
                );

                return;
            }

            try {

                const btn =
                    document.querySelector(".btn-main");

                btn.disabled = true;

                btn.innerHTML = `
                        <span class="spinner-border spinner-border-sm me-2"></span>
                        Criando conta...
                    `;

                const res = await fetch(
                    "/api/Auth/registro",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type":
                                "application/json"
                        },

                        body: JSON.stringify({

                            email,
                            senha,
                            telefone,
                            perfil: "CLIENTE"
                        })
                    }
                );

                if (!res.ok) {

                    const erro =
                        await res.text();

                    console.log(erro);

                    toast(
                        '<i class="bi bi-x-circle-fill"></i> Erro ao cadastrar',
                        'error'
                    );

                    btn.disabled = false;

                    btn.innerHTML = `
                            <i class="bi bi-check-circle-fill me-2"></i>
                            Criar Conta
                        `;

                    return;
                }

                toast(
                    '<i class="bi bi-check-circle-fill"></i> Conta criada com sucesso!',
                    'success'
                );

                setTimeout(() => {

                    window.location.href =
                        "login.html";

                }, 1200);

            } catch (erro) {

                console.error(erro);

                toast(
                    '<i class="bi bi-wifi-off"></i> Erro na API',
                    'error'
                );
            }
        }

    </script>

    <!-- BOOTSTRAP -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
